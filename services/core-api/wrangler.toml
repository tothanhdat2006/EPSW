name = "epsw-core-api"
main = "src/worker.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_als"]

[vars]
NODE_ENV = "production"
BETTER_AUTH_URL = "https://api.example.com"
BETTER_AUTH_TRUSTED_ORIGINS = "https://web.example.com,https://public.example.com"
MAX_FILE_SIZE_MB = "50"
CONFIDENCE_THRESHOLD = "70"

# Optional public URL prefixes for object URLs stored in D1.
R2_PUBLIC_BASE_URL = ""
R2_PUBLISHED_PUBLIC_BASE_URL = ""

[[d1_databases]]
binding = "DB"
database_name = "epsw-core-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "epsw-documents"

[[r2_buckets]]
binding = "REDACTED_BUCKET"
bucket_name = "epsw-redacted"

[[r2_buckets]]
binding = "PUBLISHED_BUCKET"
bucket_name = "epsw-published"

[[queues.producers]]
binding = "WORKFLOW_QUEUE"
queue = "epsw-workflow"

[[queues.consumers]]
queue = "epsw-workflow"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 5

[triggers]
crons = ["*/1 * * * *"]
