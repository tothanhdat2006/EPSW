worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"correlation_id":"$http_x_correlation_id",'
            '"upstream":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;

    # ── Rate Limiting Zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # ── Upstream Definitions ────────────────────────────────────────────────
    upstream ingestion_service {
        server ingestion-service:3001;
        keepalive 32;
    }

    upstream hitl_manager {
        server hitl-manager:3003;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:3004;
        keepalive 16;
    }

    upstream web_portal {
        server web-portal:3000;
        keepalive 16;
    }

    upstream public_dvc_web {
        server public-dvc-web:3005;
        keepalive 16;
    }

    # ── Correlation ID injection ─────────────────────────────────────────────
    map $http_x_correlation_id $correlation_id {
        default   $http_x_correlation_id;
        ""        $request_id;
    }

    # ── Main server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Propagate correlation ID to all upstream requests
        proxy_set_header X-Correlation-ID $correlation_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Host             $http_host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── Document Ingestion ───────────────────────────────────────────────
        location /api/documents {
            limit_req zone=upload_limit burst=5 nodelay;

            client_max_body_size 60M;
            proxy_read_timeout 120s;
            proxy_pass http://ingestion_service;
        }

        # ── HITL Manager ─────────────────────────────────────────────────────
        location /api/hitl {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://hitl_manager;
        }

        # ── Notification (internal health check only) ─────────────────────
        location /api/notifications/health {
            proxy_pass http://notification_service/health;
        }

        # ── Internal Portal (staff/leader) ────────────────────────────────
        location /portal {
            proxy_pass http://web_portal;
        }

        # ── Public DVC Web (citizen-facing) ───────────────────────────────
        location / {
            proxy_pass http://public_dvc_web;
        }

        # ── Health aggregation ────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
