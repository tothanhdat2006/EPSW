<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
		<script>
			(() => {
				const root = document.documentElement;

				try {
					const storedTheme = localStorage.getItem('theme');
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme =
						storedTheme === 'dark' || storedTheme === 'light'
							? storedTheme
							: prefersDark
								? 'dark'
								: 'light';

					root.classList.toggle('dark', theme === 'dark');
					root.classList.toggle('light', theme === 'light');
					root.setAttribute('data-theme', theme);
				} catch {
					root.classList.add('dark');
					root.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen bg-background text-foreground antialiased selection:bg-primary selection:text-primary-foreground">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
