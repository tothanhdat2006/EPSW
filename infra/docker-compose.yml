networks:
  dvc-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  keycloak-data:
  redis-data:

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dvc-postgres
    networks: [dvc-net]
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: dvc_user
      POSTGRES_PASSWORD: dvc_password
      POSTGRES_DB: dvc_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dvc_user -d dvc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible Object Storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dvc-minio
    networks: [dvc-net]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: dvc-minio-init
    networks: [dvc-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local http://minio:9000 minio_admin minio_password
      mc mb --ignore-existing local/dvc-documents
      mc mb --ignore-existing local/dvc-redacted
      mc mb --ignore-existing local/dvc-published
      echo 'Buckets initialized.'
      "

  # ── Keycloak (IAM) ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: dvc-keycloak
    networks: [dvc-net]
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/dvc_db
      KC_DB_USERNAME: dvc_user
      KC_DB_PASSWORD: dvc_password
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak-data:/opt/keycloak/data

  # ── Redis (BullMQ backend) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dvc-redis
    networks: [dvc-net]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Unified Core API (Express + BullMQ) ──────────────────────────────────
  core-api:
    build:
      context: ..
      dockerfile: services/core-api/Dockerfile
    container_name: dvc-core-api
    networks: [dvc-net]
    ports:
      - "${CORE_API_PORT:-3001}:3001"
    environment:
      PORT: ${CORE_API_PORT:-3001}
      NODE_ENV: development
      DATABASE_URL: postgresql://dvc_user:dvc_password@postgres:5432/dvc_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_DOCUMENTS: dvc-documents
      MINIO_BUCKET_REDACTED: dvc-redacted
      MINIO_BUCKET_PUBLISHED: dvc-published
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: dvc
      LLM_PROVIDER: alibaba
      LLM_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      LLM_MODEL: qwen-plus
      LLM_API_KEY: ${LLM_API_KEY:-}
      ALIBABA_OCR_API_URL: ${ALIBABA_OCR_API_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
