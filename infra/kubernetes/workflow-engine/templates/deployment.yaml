apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-engine
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
  labels:
    app: workflow-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-engine
  template:
    metadata:
      labels:
        app: workflow-engine
    spec:
      containers:
        - name: workflow-engine
          image: "dvc/workflow-engine:latest"
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_ADDRESS
              value: "{{ .Values.global.temporal.address }}"
            - name: TEMPORAL_NAMESPACE
              value: "{{ .Values.global.temporal.namespace }}"
            - name: TEMPORAL_TASK_QUEUE
              value: "{{ .Values.global.temporal.taskQueue }}"
            - name: KAFKA_BROKERS
              value: "{{ .Values.global.kafka.brokers }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dvc-postgres-secret
                  key: url
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
