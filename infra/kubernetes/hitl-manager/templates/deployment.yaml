apiVersion: apps/v1
kind: Deployment
metadata:
  name: hitl-manager
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
  labels:
    app: hitl-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hitl-manager
  template:
    metadata:
      labels:
        app: hitl-manager
    spec:
      containers:
        - name: hitl-manager
          image: "dvc/hitl-manager:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: KAFKA_BROKERS
              value: "{{ .Values.global.kafka.brokers }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dvc-postgres-secret
                  key: url
            - name: KEYCLOAK_URL
              value: "{{ .Values.global.keycloak.url }}"
            - name: KEYCLOAK_REALM
              value: "{{ .Values.global.keycloak.realm }}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hitl-manager
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
spec:
  selector:
    app: hitl-manager
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
