apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-service
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
  labels:
    app: ai-agent-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ai-agent-service
  template:
    metadata:
      labels:
        app: ai-agent-service
    spec:
      containers:
        - name: ai-agent-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: KAFKA_BROKERS
              value: "{{ .Values.global.kafka.brokers }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dvc-postgres-secret
                  key: url
            - name: MINIO_ENDPOINT
              value: "{{ .Values.global.minio.endpoint }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dvc-minio-secret
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dvc-minio-secret
                  key: secretKey
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.global.llm.apiKeySecretName }}"
                  key: "{{ .Values.global.llm.apiKeySecretKey }}"
            - name: LLM_MODEL
              value: "{{ .Values.global.llm.model }}"
            - name: CONFIDENCE_THRESHOLD
              value: "{{ .Values.confidenceThreshold }}"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-service
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
spec:
  selector:
    app: ai-agent-service
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  type: ClusterIP
