apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: {{ .Values.global.namespace | default "dvc-system" }}
  labels:
    app: ingestion-service
    version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
        version: {{ .Chart.AppVersion }}
    spec:
      containers:
        - name: ingestion-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PORT
              value: "{{ .Values.service.port }}"
            - name: NODE_ENV
              value: production
            - name: KAFKA_BROKERS
              value: "{{ .Values.global.kafka.brokers }}"
            - name: KAFKA_CLIENT_ID
              value: ingestion-service
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dvc-postgres-secret
                  key: url
            - name: MINIO_ENDPOINT
              value: "{{ .Values.global.minio.endpoint }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.global.minio.accessKeySecretName }}"
                  key: "{{ .Values.global.minio.accessKeySecretKey }}"
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.global.minio.secretKeySecretName }}"
                  key: "{{ .Values.global.minio.secretKeyKey }}"
            - name: KEYCLOAK_URL
              value: "{{ .Values.global.keycloak.url }}"
            - name: KEYCLOAK_REALM
              value: "{{ .Values.global.keycloak.realm }}"
          resources:
            requests:
              cpu: {{ .Values.global.resources.requests.cpu }}
              memory: {{ .Values.global.resources.requests.memory }}
            limits:
              cpu: {{ .Values.global.resources.limits.cpu }}
              memory: {{ .Values.global.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
